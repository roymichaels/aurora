version: '3.9'
services:
  couchdb:
    image: couchdb:3
    restart: unless-stopped
    ports:
      - '5984:5984'
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: admin
  api:
    build: .
    command: node dist/server.js
    environment:
      COUCH_URL: http://couchdb:5984
      JWT_SECRET: supersecret
    depends_on:
      - couchdb
  proxy:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '8080:80'
    depends_on:
      - api
